name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'  # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # required so the action can detect + amend the previous GIF commit

      # Pinned to the commit behind the v2 tag as of 2026-03-13
      - uses: czl9707/gh-space-shooter@96d45ed9a790300da731b9fc49b95d697f528464
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
