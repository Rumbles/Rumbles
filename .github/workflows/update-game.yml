name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'  # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # required so the action can detect + amend the previous GIF commit

      # Pinned to Rumbles/gh-space-shooter fork main @ 2026-07-19 (#3: fetch contribution calendar in 4-week windows to dodge GraphQL "resource limits exceeded"; installs from source; paces requests + retries secondary rate limits)
      - uses: Rumbles/gh-space-shooter@b2fa74aecd2374dd1d3f03cd38a6ba6b5420ddb1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
