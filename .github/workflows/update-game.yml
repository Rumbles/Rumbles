name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'  # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # required so the action can detect + amend the previous GIF commit

      # Pinned to Rumbles/gh-space-shooter fork main @ 2026-04-15 (hardened: setup-python v6, pinned bump-my-version, script-injection fix, explicit permissions)
      - uses: Rumbles/gh-space-shooter@9d8bf8259672a4e9e0710107344c794c9f2fb593
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
