name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'  # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # required so the action can detect + amend the previous GIF commit

      # Pinned to Rumbles/gh-space-shooter fork main @ 2026-07-19 (adds exponential-backoff retry on transient GitHub API 502s / "resource limits" errors; prior: setup-python v6, script-injection fix, explicit permissions)
      - uses: Rumbles/gh-space-shooter@97671aac1152e42d5a7f4f3ea99ec6184c657616
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
